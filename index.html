<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F6F2">
<title>Director's Inbox — JECRC</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#F7F6F2;--surface:#fff;--s2:#F0EEE9;--s3:#E8E6DF;
  --bd:rgba(0,0,0,0.08);--bdm:rgba(0,0,0,0.14);--bds:rgba(0,0,0,0.26);
  --t:#1A1A18;--t2:#6B6A65;--t3:#9E9C97;
  --rbg:#FEF0EF;--rt:#8B2020;--rb:#F5C4C4;
  --abg:#FEF5E7;--at:#7A4A0A;--ab:#F5D99A;
  --bbg:#EDF4FE;--bt:#1A4F8A;--bb:#AECEF5;
  --gbg:#EDFAF3;--gt:#0F5C35;--gb:#A3DFBE;
  --pbg:#F2EFFD;--pt:#3D2B8A;--pb:#C5BAF0;
  --tbg:#E5F8F5;--tt:#0A5449;--tbb:#9EE0D6;
  --r:10px;--rl:14px;--rp:999px;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shm:0 4px 16px rgba(0,0,0,0.10),0 1px 3px rgba(0,0,0,0.05);
  --shl:0 8px 32px rgba(0,0,0,0.14),0 2px 8px rgba(0,0,0,0.08);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;min-height:100dvh;overscroll-behavior-y:none}

/* ── LOADING ── */
#ls{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .3s}
#ls.hide{opacity:0;pointer-events:none}
.ls-logo{width:52px;height:52px;border-radius:14px;background:var(--t);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:19px;font-weight:500;color:var(--bg)}
.ls-txt{font-size:13px;color:var(--t3)}
.spinner{width:22px;height:22px;border:2px solid var(--bd);border-top-color:var(--t);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--bd);padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;gap:10px;position:sticky;top:0;z-index:60}
.hdr-l{display:flex;align-items:center;gap:10px;min-width:0}
.logo{width:36px;height:36px;border-radius:10px;background:var(--t);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--bg);flex-shrink:0}
.hdr-info{min-width:0}
.hdr-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-size:10px;color:var(--t3);margin-top:1px;display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background .3s}
.sync-dot.live{background:#1D9E75}
.sync-dot.saving{background:#BA7517;animation:pulse .6s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-r{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* ── DATE BAR ── */
.dbar{background:var(--surface);border-bottom:1px solid var(--bd);display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;position:sticky;top:61px;z-index:55}
.dbar::-webkit-scrollbar{display:none}
.dtab{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:8px 12px;border:none;background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;border-bottom:2.5px solid transparent;transition:all .14s;display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;min-width:52px}
.dtab:active{background:var(--s2)}
.dtab.on{color:var(--t);border-bottom-color:var(--t);font-weight:600}
.dt-num{font-size:14px;font-weight:600;line-height:1}
.dt-lbl{font-size:9px;opacity:.6;margin-top:1px}
.dtab.on .dt-lbl{opacity:1}
.dtab.tod .dt-lbl{color:var(--bt);opacity:1;font-weight:600}
.dt-badge{font-size:8px;background:var(--rbg);color:var(--rt);border-radius:var(--rp);padding:1px 4px;margin-top:2px;display:none;line-height:1.4}
.dt-badge.vis{display:block}
.dnav{padding:0 8px;border:none;background:transparent;color:var(--t3);cursor:pointer;font-size:16px;display:flex;align-items:center;flex-shrink:0;min-width:36px;justify-content:center}
.dpick{display:flex;align-items:center;padding:6px 8px;border-left:1px solid var(--bd);flex-shrink:0}
.dpick input{font-size:11px;border:1px solid var(--bdm);border-radius:8px;padding:4px 6px;background:var(--surface);color:var(--t);cursor:pointer;outline:none;width:36px;opacity:0;position:absolute}
.dpick-icon{font-size:16px;cursor:pointer}

/* ── BUTTONS ── */
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:8px 14px;border-radius:var(--r);border:1px solid var(--bdm);background:transparent;color:var(--t);cursor:pointer;transition:all .14s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.97)}
.btn-solid{background:var(--t);color:var(--bg);border-color:var(--t)}
.btn-sm{font-size:11px;padding:6px 11px;border-radius:8px}
.btn-xs{font-size:10px;padding:5px 9px;border-radius:7px}
.btn-grn{background:var(--gbg);color:var(--gt);border-color:var(--gb)}
.btn-red{background:var(--rbg);color:var(--rt);border-color:var(--rb)}
.btn-amb{background:var(--abg);color:var(--at);border-color:var(--ab)}
.btn-report{background:var(--t);color:#fff;border-color:var(--t);font-weight:600}

/* ── FAB (mobile add button) ── */
.fab{display:none;position:fixed;bottom:calc(72px + var(--safe-bottom));right:18px;width:54px;height:54px;border-radius:50%;background:var(--t);color:var(--bg);font-size:24px;border:none;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,0.25);z-index:50;transition:transform .14s;-webkit-user-select:none}
.fab:active{transform:scale(.93)}

/* ── BOTTOM NAV (mobile) ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--bd);padding:8px 0;padding-bottom:calc(8px + var(--safe-bottom));z-index:60;flex-direction:row;justify-content:space-around;align-items:center}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 16px;border:none;background:transparent;cursor:pointer;color:var(--t3);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;border-radius:var(--r);transition:all .12s;-webkit-user-select:none}
.bni:active{background:var(--s2)}
.bni.on{color:var(--t)}
.bni-icon{font-size:20px;line-height:1}

/* ── MAIN ── */
.main{max-width:860px;margin:0 auto;padding:16px 14px 140px}

/* ── PAST BANNER ── */
.pbanner{background:var(--abg);border:1px solid var(--ab);border-radius:var(--rl);padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--at);display:none;align-items:center;justify-content:space-between;gap:10px}
.pbanner.show{display:flex}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px}
.sc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);padding:11px 6px 9px;text-align:center;cursor:pointer;transition:all .14s;box-shadow:var(--sh)}
.sc:active{transform:scale(.96)}
.sc.on{border-color:var(--bds);box-shadow:var(--shm)}
.sn{font-size:20px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.sl{font-size:9px;color:var(--t3);margin-top:3px;font-weight:500}
.nr{color:var(--rt)}.na{color:var(--at)}.nb{color:var(--bt)}.np{color:var(--pt)}.ng{color:var(--gt)}

/* ── FILTER BAR ── */
.fbar{display:flex;gap:5px;align-items:center;flex-wrap:nowrap;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.fbar::-webkit-scrollbar{display:none}
.fp{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:5px 11px;border-radius:var(--rp);border:1px solid var(--bdm);background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-user-select:none}
.fp:active{opacity:.7}
.fp.on{background:var(--t);color:var(--bg);border-color:var(--t)}
.sw{flex-shrink:0;margin-left:auto}
.sw input{font-size:12px;padding:5px 11px;border:1px solid var(--bdm);border-radius:var(--rp);background:var(--surface);color:var(--t);font-family:'DM Sans',sans-serif;outline:none;width:110px}
.sw input::placeholder{color:var(--t3)}

/* ── SECTION LABEL ── */
.sec{display:flex;align-items:center;gap:7px;font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.scnt{font-size:9px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rp);padding:1px 6px;color:var(--t3);font-family:'DM Mono',monospace}
.sline{flex:1;height:1px;background:var(--bd)}

/* ── CARDS ── */
.cards{display:flex;flex-direction:column;gap:6px}
.mc{background:var(--surface);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;transition:border-color .14s;box-shadow:var(--sh);-webkit-user-select:none}
.mc:active{background:var(--s2)}
.mc.exp{border-color:var(--bds)}
.mct{display:flex;align-items:center;gap:9px;padding:12px 12px}
.pbar{width:3px;border-radius:2px;align-self:stretch;min-height:28px;flex-shrink:0}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.mi{flex:1;min-width:0}
.mr1{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:2px}
.msndr{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mrgt{display:flex;align-items:center;gap:4px;flex-shrink:0}
.mtime{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace}
.msubj{font-size:11px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.tag{font-size:9px;font-weight:500;padding:2px 6px;border-radius:var(--rp);border:1px solid;white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.tg1{background:var(--rbg);color:var(--rt);border-color:var(--rb)}
.tg2{background:var(--abg);color:var(--at);border-color:var(--ab)}
.tg3{background:var(--bbg);color:var(--bt);border-color:var(--bb)}
.aipill{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--tt);background:var(--tbg);border:1px solid var(--tbb);border-radius:var(--rp);padding:2px 7px;max-width:100%;overflow:hidden}
.aipill span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.aidot{width:5px;height:5px;border-radius:50%;background:#1D9E75;flex-shrink:0}
.dlchip{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:500;color:var(--at);background:var(--abg);border:1px solid var(--ab);border-radius:var(--rp);padding:2px 6px}

/* ── CARD BODY ── */
.mcb{display:none;padding:0 12px 12px;border-top:1px solid var(--bd)}
.mc.exp .mcb{display:block}
.msgraw{font-size:12px;color:var(--t2);line-height:1.65;background:var(--s2);border-radius:var(--r);padding:9px 11px;margin:10px 0 9px;border:1px solid var(--bd);white-space:pre-wrap;word-break:break-word;max-height:180px;overflow-y:auto}
.aiblk{display:flex;align-items:flex-start;gap:7px;background:var(--tbg);border:1px solid var(--tbb);border-radius:var(--r);padding:8px 10px;margin-bottom:9px}
.aiblk-t{font-size:11px;color:var(--tt);line-height:1.5}
.arow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.rbox{margin-top:8px}
.rbox textarea{width:100%;font-size:12px;border:1px solid var(--bdm);border-radius:var(--r);padding:9px 10px;resize:vertical;min-height:80px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--t);margin-bottom:7px;outline:none}
.rbox textarea:focus{border-color:var(--bds)}

/* ── MOVE MENU ── */
.mmenu{display:none;position:fixed;background:var(--surface);border:1px solid var(--bdm);border-radius:var(--rl);box-shadow:var(--shl);z-index:300;min-width:210px;overflow:hidden}
.mmenu.vis{display:block}
.mitem{display:flex;align-items:center;gap:9px;padding:11px 14px;font-size:13px;cursor:pointer;color:var(--t);border:none;background:transparent;width:100%;font-family:'DM Sans',sans-serif;text-align:left}
.mitem:active{background:var(--s2)}
.mdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── AI BITS ── */
.pgwrap{height:2px;background:var(--bd);border-radius:2px;overflow:hidden;margin:4px 0 8px}
.pgbar{height:2px;background:#1D9E75;border-radius:2px;width:0;transition:width .32s}
.aibtn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:6px 11px;border-radius:var(--r);border:1px solid var(--tbb);background:var(--tbg);color:var(--tt);cursor:pointer}
.aibtn:active{opacity:.7}
.aibtn:disabled{opacity:.5;cursor:not-allowed}
.aistat{font-size:11px;color:var(--tt)}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:13px}
.empty-ico{font-size:32px;margin-bottom:10px}

/* ── MODAL OVERLAY ── */
.mdbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-end;justify-content:center;padding:0}
.mdbg.on{display:flex}
/* Sheet slides up from bottom on mobile */
.mdl{background:var(--surface);border-radius:20px 20px 0 0;border:1px solid var(--bdm);padding:20px 18px calc(18px + var(--safe-bottom));width:100%;max-width:600px;box-shadow:var(--shl);max-height:92dvh;overflow-y:auto}
.mdl-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 16px}
.mdl h3{font-size:15px;font-weight:600;margin-bottom:14px}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:11px;font-weight:500;color:var(--t2);margin-bottom:3px}
.fr input,.fr select,.fr textarea{width:100%;font-size:14px;border:1px solid var(--bdm);border-radius:var(--r);padding:10px 11px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--t);outline:none;-webkit-appearance:none}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--bds)}
.fr textarea{min-height:90px;resize:vertical}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mdfoot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}

/* ── REPORT MODAL ── */
.rbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;align-items:flex-end;justify-content:center}
.rbg.on{display:flex}
.rmd{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;box-shadow:var(--shl);max-height:92dvh;display:flex;flex-direction:column}
.rmd-handle{width:36px;height:4px;background:var(--s3);border-radius:2px;margin:12px auto 0}
.rmd-head{padding:14px 18px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.rmd-head h3{font-size:15px;font-weight:600}
.rmd-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--t3);padding:4px 8px;border-radius:8px}
.rmd-preview{flex:1;overflow-y:auto;padding:16px 18px;-webkit-overflow-scrolling:touch}
.rmd-actions{padding:12px 18px;padding-bottom:calc(12px + var(--safe-bottom));border-top:1px solid var(--bd);display:flex;gap:8px;flex-wrap:wrap;background:var(--surface)}

/* ── REPORT PREVIEW ── */
.rp-org{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.rp-title{font-size:18px;font-weight:700;color:var(--t);margin-bottom:3px;line-height:1.2}
.rp-date{font-size:12px;color:var(--t2);margin-bottom:14px}
.rp-div{height:2px;background:var(--t);border-radius:1px;margin-bottom:14px}
.rp-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.rp-stat{background:var(--s2);border-radius:var(--r);padding:9px 6px;text-align:center}
.rp-sn{font-size:18px;font-weight:700;font-family:'DM Mono',monospace;line-height:1}
.rp-sl{font-size:9px;color:var(--t3);margin-top:3px;font-weight:500}
.rp-sec{margin-bottom:14px}
.rp-shead{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.rp-sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.rp-item{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:var(--r);margin-bottom:4px}
.rp-iname{font-size:12px;font-weight:600;margin-bottom:2px}
.rp-isum{font-size:11px;color:var(--t2);line-height:1.5}
.rp-idl{font-size:10px;font-weight:500;color:var(--at);margin-top:3px}
.rp-none{font-size:11px;color:var(--t3);font-style:italic;padding:3px 0}
.rp-foot{margin-top:14px;padding-top:10px;border-top:1px solid var(--bd);font-size:10px;color:var(--t3);display:flex;justify-content:space-between}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(80px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--t);color:var(--bg);font-size:12px;padding:9px 18px;border-radius:var(--rp);opacity:0;transition:all .22s;z-index:400;pointer-events:none;white-space:nowrap;box-shadow:var(--shm)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DESKTOP overrides ── */
@media(min-width:640px){
  .mdbg{align-items:center;padding:20px 14px}
  .mdl{border-radius:var(--rl);max-height:88vh}
  .mdl-handle{display:none}
  .rbg{align-items:center}
  .rmd{border-radius:var(--rl);max-height:88vh}
  .rmd-handle{display:none}
  .fab{display:none !important}
  .bnav{display:none !important}
  .hdr-r .btn-desktop{display:inline-flex}
  .main{padding:20px 18px 60px}
  .toast{bottom:22px}
  .stats{grid-template-columns:repeat(5,1fr)}
  .sn{font-size:22px}
  .sl{font-size:10px}
  .msndr{max-width:260px}
  .dtab{font-size:12px;padding:9px 14px;min-width:60px}
  .dt-num{font-size:15px}
}

/* ── MOBILE specific ── */
@media(max-width:639px){
  .fab{display:flex}
  .bnav{display:flex}
  .hdr-r .hide-mobile{display:none}
  .stats{grid-template-columns:repeat(3,1fr)}
  .stats .sc:nth-child(4),.stats .sc:nth-child(5){display:none}
  .fgrid{grid-template-columns:1fr}
  .msndr{max-width:160px}
  .sw input{width:90px}
  .arow{gap:4px}
  .btn-sm{font-size:10px;padding:5px 8px}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="ls">
  <div class="ls-logo">DI</div>
  <div class="spinner"></div>
  <div class="ls-txt">Connecting to live data…</div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-l">
    <div class="logo">DI</div>
    <div class="hdr-info">
      <div class="hdr-title">Director's Inbox</div>
      <div class="hdr-sub"><span class="sync-dot" id="syncDot"></span><span id="syncTxt">Connecting…</span></div>
    </div>
  </div>
  <div class="hdr-r">

        <select id="f-priority">
          <option value="urgent">🔴 Urgent — reply today</option>
          <option value="reply">🟠 Needs reply</option>

<!-- MOVE MENU -->
<div id="mmenu" class="mmenu"></div>
<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ── CONSTANTS ── */
const PRIOS=[
  {id:'urgent',  label:'Urgent — reply today',      dot:'#E24B4A'},
  {id:'reply',   label:'Needs reply',               dot:'#BA7517'},
  {id:'fyi',     label:'Just FYI',                  dot:'#378ADD'},
  {id:'delegate',label:'Delegate / sign',           dot:'#639922'},
  {id:'waiting', label:'Waiting for response',      dot:'#7F77DD'},
  {id:'done',    label:'Done / replied',            dot:'#888780'},
];
const AVC={urgent:'background:#FCEBEB;color:#791F1F',reply:'background:#FAEEDA;color:#633806',fyi:'background:#E6F1FB;color:#0C447C',delegate:'background:#EAF3DE;color:#27500A',waiting:'background:#EEEDFE;color:#3C3489',done:'background:#F1EFE8;color:#444441'};
const PBC={urgent:'#E24B4A',reply:'#BA7517',fyi:'#378ADD',delegate:'#639922',waiting:'#7F77DD',done:'#B4B2A9'};
const SRCS={gmail1:['director@jecrc.ac.in','tg1'],gmail2:['vicechairman.arpit@jecrcu.edu.in','tg2'],linkedin:['LinkedIn','tg3']};
const RPC={urgent:{bg:'#FEF0EF',dot:'#E24B4A',t:'#8B2020'},reply:{bg:'#FEF5E7',dot:'#BA7517',t:'#7A4A0A'},delegate:{bg:'#EDFAF3',dot:'#639922',t:'#0F5C35'},waiting:{bg:'#F2EFFD',dot:'#7F77DD',t:'#3D2B8A'},fyi:{bg:'#EDF4FE',dot:'#378ADD',t:'#1A4F8A'},done:{bg:'#F1EFE8',dot:'#888780',t:'#4A4A47'}};
const RPT_SECS=[
  {id:'urgent', label:'Urgent — Reply Today',  emoji:'🔴'},
  {id:'reply',  label:'Needs a Reply',         emoji:'🟠'},
  {id:'delegate',label:'Delegate / Sign',      emoji:'🟢'},
  {id:'waiting',label:'Waiting for Response',  emoji:'🟣'},
  {id:'fyi',    label:'FYI — Just Be Aware',   emoji:'🔵'},
];

/* ── FIREBASE ── */
const FB_CONFIG={
  apiKey:"AIzaSyDnEkG1IGNKsFPZ33i0pY5HQ6_yao7NFPQ",
  authDomain:"directors-inbox-jecrc.firebaseapp.com",
  databaseURL:"https://directors-inbox-jecrc-default-rtdb.firebaseio.com",
  projectId:"directors-inbox-jecrc",
  storageBucket:"directors-inbox-jecrc.firebasestorage.app",
  messagingSenderId:"467072283243",
  appId:"1:467072283243:web:e6784dadd035928c86372e",
  measurementId:"G-Z6MM92M9W7"
};

/* ── STATE ── */
let db=null,dbRef=null,allData={};
let activeDate=todayKey(),activeFilter='all',expandedId=null,replyVisible=null,tabOffset=0;

/* ── DATE HELPERS ── */
function todayKey(){return new Date().toISOString().split('T')[0]}
function dateKey(d){return d.toISOString().split('T')[0]}
function fmtFull(k){return new Date(k+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function fmtFull2(k){return new Date(k+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}

/* ── UTILS ── */
function initials(n){return(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg,dur=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}
function setSyncStatus(s){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');
  if(s==='live'){dot.className='sync-dot live';txt.textContent='Live';}
  else if(s==='saving'){dot.className='sync-dot saving';txt.textContent='Saving…';}
  else if(s==='offline'){dot.className='sync-dot';txt.textContent='Offline';}
  else{dot.className='sync-dot';txt.textContent='Connecting…';}
}
function msgsForDate(k){return allData[k]||[]}
function bniClick(id){document.querySelectorAll('.bni').forEach(b=>b.classList.toggle('on',b.id==='bni-'+id));}
function bgClick(e,id){if(e.target===document.getElementById(id)){if(id==='mdbg')closeModal();else closeReport();}}

/* ── FIREBASE INIT ── */
function initFirebase(){
  try{
    firebase.initializeApp(FB_CONFIG);
    db=firebase.database();dbRef=db.ref('inbox');
    db.ref('.info/connected').on('value',s=>{setSyncStatus(s.val()?'live':'offline');});
    dbRef.on('value',snap=>{
      const raw=snap.val()||{};
      allData={};
      Object.keys(raw).forEach(k=>{
        allData[k]=raw[k]&&typeof raw[k]==='object'&&!Array.isArray(raw[k])?Object.values(raw[k]):raw[k]||[];
      });
      hideLoad();renderDateTabs();renderStats();renderList();
    },()=>{setSyncStatus('offline');hideLoad();});
  }catch(e){setSyncStatus('offline');hideLoad();}
}
function hideLoad(){const s=document.getElementById('ls');s.classList.add('hide');setTimeout(()=>s.style.display='none',400);}
function saveDate(k){
  if(!db)return;setSyncStatus('saving');
  const arr=allData[k]||[];
  const obj={};arr.forEach(m=>obj[m.id]=m);
  dbRef.child(k).set(arr.length?obj:null).then(()=>{setSyncStatus('live');renderDateTabs();}).catch(()=>{setSyncStatus('offline');toast('Save failed');});
}

/* ── DATE TABS ── */
function renderDateTabs(){
  const today=todayKey();
  let dates=[];
  for(let i=3+tabOffset;i>=-3+tabOffset;i--){const d=new Date();d.setDate(d.getDate()-i);const k=dateKey(d);if(k<=today)dates.push(k);}
  if(!dates.includes(activeDate)){dates.unshift(activeDate);dates=dates.slice(0,7);}
  dates.sort((a,b)=>a<b?1:-1);
  const tabs=document.getElementById('dtabs');
  tabs.innerHTML=dates.map(k=>{
    const d=new Date(k+'T00:00:00');
    const num=d.toLocaleDateString('en-IN',{day:'numeric'});
    const mon=d.toLocaleDateString('en-IN',{month:'short'});
    const wd=d.toLocaleDateString('en-IN',{weekday:'short'});
    const isToday=k===today,isActive=k===activeDate;
    const msgs=msgsForDate(k);
    const urg=msgs.filter(m=>m.priority==='urgent').length;
    return `<button class="dtab${isActive?' on':''}${isToday?' tod':''}" onclick="switchDate('${k}')">
      <span class="dt-num">${num}</span>
      <span class="dt-lbl">${isToday?mon+' · Today':mon+' '+wd}</span>
      <span class="dt-badge${urg>0?' vis':''}">${urg}🔴</span>
    </button>`;
  }).join('');
  document.getElementById('dpinput').value=activeDate;
  const pb=document.getElementById('pbanner');
  if(activeDate!==today){pb.classList.add('show');document.getElementById('pbannertxt').textContent='Viewing '+fmtFull2(activeDate);}
  else pb.classList.remove('show');
}
function switchDate(k){
  activeDate=k;expandedId=null;replyVisible=null;activeFilter='all';
  document.querySelectorAll('.fp').forEach(p=>p.classList.toggle('on',p.dataset.f==='all'));
  renderDateTabs();renderStats();renderList();
}
function goToday(){switchDate(todayKey());}
function shiftDates(d){tabOffset=Math.max(0,tabOffset+d);renderDateTabs();}
function jumpToDate(v){
  if(!v||v>todayKey()){toast("Can't go to future.");return;}
  const diff=Math.round((new Date()-new Date(v+'T00:00:00'))/86400000);
  tabOffset=Math.max(0,diff-3);switchDate(v);
}

/* ── STATS ── */
function renderStats(){
  const msgs=msgsForDate(activeDate);
  const items=[{id:'urgent',cls:'nr',lbl:'Urgent'},{id:'reply',cls:'na',lbl:'Reply'},{id:'fyi',cls:'nb',lbl:'FYI'},{id:'waiting',cls:'np',lbl:'Waiting'},{id:'done',cls:'ng',lbl:'Done'}];
  document.getElementById('statsRow').innerHTML=items.map(i=>`<div class="sc${activeFilter===i.id?' on':''}" onclick="setFilter('${i.id}',null)"><div class="sn ${i.cls}">${msgs.filter(m=>m.priority===i.id).length}</div><div class="sl">${i.lbl}</div></div>`).join('');
}

/* ── FILTER ── */
function setFilter(f){
  activeFilter=f;
  document.querySelectorAll('.fp').forEach(p=>p.classList.toggle('on',p.dataset.f===f));
  renderStats();renderList();
}

/* ── LIST ── */
function renderList(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const order=['urgent','reply','delegate','waiting','fyi','done'];
  let html='';
  order.forEach(k=>{
    const grp=msgsForDate(activeDate).filter(m=>{
      const mf=activeFilter==='all'||m.priority===activeFilter;
      const mp=m.priority===k;
      const mq=!q||[m.sender,m.subject,m.summary,m.body].some(x=>(x||'').toLowerCase().includes(q));
      return mf&&mp&&mq;
    });
    if(!grp.length)return;
    const p=PRIOS.find(x=>x.id===k);
    html+=`<div class="sec"><span class="sdot" style="background:${p.dot}"></span>${p.label}<span class="scnt">${grp.length}</span><div class="sline"></div></div>`;
    html+='<div class="cards">'+grp.map(m=>cardHTML(m)).join('')+'</div>';
  });
  if(!html)html=`<div class="empty"><div class="empty-ico">📭</div>${activeDate===todayKey()?'No messages today.<br><span style="font-size:11px;display:block;margin-top:5px">Tap + to add the first one</span>':'No messages on this date.'}</div>`;
  document.getElementById('listArea').innerHTML=html;
  attachCardEvents();
}

/* ── CARD ── */
function cardHTML(m){
  const[src,sc]=SRCS[m.source]||['?','tg1'];
  const srcS=src.includes('@')?src.split('@')[0]+'…':src;
  const isExp=expandedId===m.id,showR=replyVisible===m.id;
  const dl=m.deadline?`<span class="dlchip">⏰ ${esc(m.deadline)}</span>`:'';
  const sum=m.summary?`<div class="aipill"><span class="aidot"></span><span>${esc(m.summary)}</span></div>`:'';
  return `<div class="mc${isExp?' exp':''}" data-id="${m.id}">
  <div class="mct">
    <div class="pbar" style="background:${PBC[m.priority]||'#ccc'}"></div>
    <div class="av" style="${AVC[m.priority]||AVC.done}">${initials(m.sender)}</div>
    <div class="mi">
      <div class="mr1">
        <span class="msndr">${esc(m.sender)}</span>
        <div class="mrgt"><span class="tag ${sc}" title="${esc(src)}">${esc(srcS)}</span><span class="mtime">${esc(m.time||'')}</span></div>
      </div>
      <div class="msubj">${esc(m.subject)}</div>
      <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:3px">${sum}${dl}</div>
    </div>
  </div>
  <div class="mcb">
    <div class="msgraw">${esc(m.body)}</div>
    ${m.summary?`<div class="aiblk"><span style="font-size:13px;flex-shrink:0">✦</span><div class="aiblk-t">${esc(m.summary)}</div></div>`:''}
    <div class="arow">
      ${m.priority!=='done'?`<button class="btn btn-solid btn-sm" onclick="toggleReply(${m.id},event)">Draft reply</button>`:''}
      ${m.priority!=='done'?`<button class="btn btn-grn btn-sm" onclick="markDone(${m.id},event)">✓ Done</button>`:''}
      <button class="btn btn-amb btn-sm" onclick="openMove(${m.id},event)">Move ▾</button>
      <button class="btn btn-sm" onclick="openModal(${m.id},event)">✏ Edit</button>
      <button class="btn btn-red btn-sm" onclick="deleteMsg(${m.id},event)">✕</button>
    </div>
    ${showR?`<div class="rbox"><textarea id="rt-${m.id}" placeholder="Draft reply for director's review…"></textarea><div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><button class="aibtn" onclick="aiDraft(${m.id},event)">✦ AI draft</button><button class="btn btn-solid btn-sm" onclick="copyReply(${m.id},event)">Copy</button><button class="btn btn-sm" onclick="closeReply(event)">Cancel</button></div></div>`:''}
  </div>
</div>`;
}
function attachCardEvents(){
  document.querySelectorAll('.mc').forEach(c=>{
    c.addEventListener('click',function(e){
      if(e.target.closest('button')||e.target.closest('textarea'))return;
      const id=parseInt(this.dataset.id);
      expandedId=expandedId===id?null:id;
      if(expandedId!==id)replyVisible=null;
      renderList();
    });
  });
}

/* ── MOVE ── */
function openMove(id,e){
  e.stopPropagation();
  const m=msgsForDate(activeDate).find(x=>x.id===id);if(!m)return;
  const menu=document.getElementById('mmenu');
  menu.innerHTML=PRIOS.filter(p=>p.id!==m.priority).map(p=>`<button class="mitem" onclick="doMove(${id},'${p.id}')"><span class="mdot" style="background:${p.dot}"></span>${p.label}</button>`).join('');
  const rect=e.currentTarget.getBoundingClientRect();
  const menuH=PRIOS.length*44;
  const spaceBelow=window.innerHeight-rect.bottom;
  const top=spaceBelow>menuH?rect.bottom+window.scrollY+4:rect.top+window.scrollY-menuH-4;
  menu.style.top=top+'px';
  menu.style.left=Math.min(rect.left,window.innerWidth-220)+'px';
  menu.classList.add('vis');
}
function doMove(id,prio){
  const m=msgsForDate(activeDate).find(x=>x.id===id);
  if(m){m.priority=prio;saveDate(activeDate);toast('Moved → '+PRIOS.find(p=>p.id===prio).label);}
  document.getElementById('mmenu').classList.remove('vis');
  renderStats();renderList();
}
document.addEventListener('click',e=>{if(!e.target.closest('.btn-amb')&&!e.target.closest('#mmenu'))document.getElementById('mmenu').classList.remove('vis');});

/* ── DONE / DELETE ── */
function markDone(id,e){
  e.stopPropagation();
  const m=msgsForDate(activeDate).find(x=>x.id===id);
  if(m)m.priority='done';expandedId=null;saveDate(activeDate);toast('Done ✓');renderStats();renderList();
}
function deleteMsg(id,e){
  e.stopPropagation();
  if(!confirm('Remove this message?'))return;
  allData[activeDate]=(allData[activeDate]||[]).filter(x=>x.id!==id);
  expandedId=null;saveDate(activeDate);toast('Removed');renderStats();renderList();
}

/* ── REPLY ── */
function toggleReply(id,e){
  e.stopPropagation();replyVisible=replyVisible===id?null:id;
  renderList();setTimeout(()=>{const t=document.getElementById('rt-'+id);if(t)t.focus();},60);
}
function closeReply(e){e.stopPropagation();replyVisible=null;renderList();}
function copyReply(id,e){
  e.stopPropagation();
  const t=document.getElementById('rt-'+id);
  if(t&&t.value)navigator.clipboard.writeText(t.value).then(()=>toast('Reply copied!'));
}

/* ── AI DRAFT ── */
async function aiDraft(id,e){
  e.stopPropagation();
  const m=msgsForDate(activeDate).find(x=>x.id===id);const ta=document.getElementById('rt-'+id);
  if(!m||!ta)return;ta.value='Drafting…';ta.disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:'Draft a professional warm reply on behalf of an Indian university director. Under 80 words. Return only the email body.',messages:[{role:'user',content:`Reply to:\nFrom: ${m.sender}\nSubject: ${m.subject}\nMessage: ${m.body}`}]})});
    const d=await r.json();ta.value=d.content?.[0]?.text||'Could not draft.';
  }catch{ta.value='Error — try again.';}
  ta.disabled=false;
}

/* ── AI SUMMARIZE ── */
function resetSummary(){
  document.getElementById('f-summary').value='';
  document.getElementById('aiStatus').textContent='';
  document.getElementById('pgbar').style.width='0';
}
async function runAISummary(){
  const body=document.getElementById('f-body').value.trim();
  if(!body){toast('Paste the message first.');return;}
  const btn=document.getElementById('aiSumBtn'),stat=document.getElementById('aiStatus'),pg=document.getElementById('pgbar');
  btn.disabled=true;btn.textContent='Summarizing…';stat.textContent='';pg.style.width='0';
  let p=0;const iv=setInterval(()=>{p=Math.min(p+8,88);pg.style.width=p+'%';},110);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:60,system:'Summarize the message in EXACTLY under 15 words. Direct and action-oriented. No punctuation at end. Return only the summary.',messages:[{role:'user',content:body}]})});
    const d=await r.json();
    clearInterval(iv);pg.style.width='100%';
    document.getElementById('f-summary').value=(d.content?.[0]?.text||'').trim();
    stat.textContent='✓ Done';setTimeout(()=>pg.style.width='0',700);
  }catch{clearInterval(iv);pg.style.width='0';stat.textContent='Error';}
  btn.disabled=false;btn.textContent='✦ AI summarize (under 15 words)';
}

/* ── MODAL ── */
function openModal(id,e){
  if(e)e.stopPropagation();
  document.getElementById('editId').value=id||'';
  if(id){
    const m=msgsForDate(activeDate).find(x=>x.id===id);if(!m)return;
    document.getElementById('mdTitle').textContent='Edit message';
    ['sender','subject','body','summary','deadline','time'].forEach(k=>document.getElementById('f-'+k).value=m[k]||'');
    document.getElementById('f-source').value=m.source||'gmail1';
    document.getElementById('f-priority').value=m.priority||'urgent';
  }else{
    document.getElementById('mdTitle').textContent='Add message';
    ['sender','subject','body','summary','deadline'].forEach(k=>document.getElementById('f-'+k).value='');
    document.getElementById('f-source').value='gmail1';
    document.getElementById('f-priority').value='urgent';
    document.getElementById('f-time').value=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    resetSummary();
  }
  document.getElementById('mdbg').classList.add('on');
  setTimeout(()=>document.getElementById('f-sender').focus(),200);
}
function closeModal(){document.getElementById('mdbg').classList.remove('on');}

function saveMsg(){
  const sender=document.getElementById('f-sender').value.trim();
  const subject=document.getElementById('f-subject').value.trim();
  if(!sender||!subject){toast('Fill in sender and subject.');return;}
  if(!allData[activeDate])allData[activeDate]=[];
  const msgs=allData[activeDate];
  const eid=document.getElementById('editId').value;
  const data={sender,subject,body:document.getElementById('f-body').value.trim()||'(No message text)',source:document.getElementById('f-source').value,priority:document.getElementById('f-priority').value,deadline:document.getElementById('f-deadline').value.trim(),time:document.getElementById('f-time').value||'Just now',summary:document.getElementById('f-summary').value.trim()};
  if(eid){const m=msgs.find(x=>x.id===parseInt(eid));if(m)Object.assign(m,data);toast('Updated ✓');}
  else{msgs.unshift({id:Date.now(),...data});toast('Added ✓');}
  saveDate(activeDate);closeModal();renderStats();renderList();
}

/* ── REPORT ── */
function buildRptData(){
  const msgs=msgsForDate(activeDate);
  return RPT_SECS.map(s=>({...s,items:msgs.filter(m=>m.priority===s.id)}));
}
function openReport(){renderReportPreview();document.getElementById('rbg').classList.add('on');bniClick('report');}
function closeReport(){document.getElementById('rbg').classList.remove('on');bniClick('inbox');}

function renderReportPreview(){
  const msgs=msgsForDate(activeDate);
  const active=msgs.filter(m=>m.priority!=='done').length;
  const done=msgs.filter(m=>m.priority==='done').length;
  const urgent=msgs.filter(m=>m.priority==='urgent').length;
  const secs=buildRptData();
  let html=`
  <div class="rp-org">JECRC University</div>
  <div class="rp-title">Director's Inbox Report</div>
  <div class="rp-date">${fmtFull(activeDate)}</div>
  <div class="rp-div"></div>
  <div class="rp-stats">
    <div class="rp-stat"><div class="rp-sn nr">${urgent}</div><div class="rp-sl">Urgent</div></div>
    <div class="rp-stat"><div class="rp-sn" style="color:#1A1A18">${active}</div><div class="rp-sl">Active</div></div>
    <div class="rp-stat"><div class="rp-sn ng">${done}</div><div class="rp-sl">Done</div></div>
    <div class="rp-stat"><div class="rp-sn nb">${msgs.length}</div><div class="rp-sl">Total</div></div>
  </div>`;
  secs.forEach(s=>{
    const c=RPC[s.id]||RPC.fyi;
    html+=`<div class="rp-sec"><div class="rp-shead"><span class="rp-sdot" style="background:${c.dot}"></span>${s.emoji} ${s.label} <span style="font-weight:400;color:var(--t3)">(${s.items.length})</span></div>`;
    if(s.items.length){
      s.items.forEach(m=>{
        html+=`<div class="rp-item" style="background:${c.bg}"><div style="flex:1;min-width:0"><div class="rp-iname">${esc(m.sender.split(',')[0])}</div><div class="rp-isum">${esc(m.summary||m.subject)}</div>${m.deadline?`<div class="rp-idl">⏰ By: ${esc(m.deadline)}</div>`:''}</div><div style="font-size:10px;color:${c.t};flex-shrink:0;padding-left:6px">${esc(m.time||'')}</div></div>`;
      });
    }else{html+=`<div class="rp-none">None</div>`;}
    html+=`</div>`;
  });
  html+=`<div class="rp-foot"><span>Director's Office — JECRC</span><span>${new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</span></div>`;
  document.getElementById('reportPreview').innerHTML=html;
}

/* ── WHATSAPP ── */
function shareWA(){
  const msgs=msgsForDate(activeDate);
  const active=msgs.filter(m=>m.priority!=='done').length;
  const secs=buildRptData();
  let txt=`*DIRECTOR'S INBOX REPORT*\n*JECRC University*\n${fmtFull(activeDate)}\n${'─'.repeat(28)}\n\n`;
  secs.forEach(s=>{
    if(!s.items.length)return;
    txt+=`${s.emoji} *${s.label.toUpperCase()}* (${s.items.length})\n`;
    s.items.forEach(m=>{
      txt+=`• *${m.sender.split(',')[0]}*\n  ${m.summary||m.subject}`;
      if(m.deadline)txt+=`\n  ⏰ By: ${m.deadline}`;
      txt+='\n';
    });
    txt+='\n';
  });
  txt+=`📊 *${active} active messages*`;
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

/* ── COPY TEXT ── */
function copyReport(){
  const msgs=msgsForDate(activeDate);
  const secs=buildRptData();
  let r=`DIRECTOR'S INBOX — JECRC University\n${fmtFull(activeDate)}\n${'─'.repeat(40)}\n\n`;
  secs.forEach(s=>{
    r+=`${s.emoji} ${s.label.toUpperCase()} (${s.items.length})\n`;
    s.items.length?s.items.forEach(m=>{r+=`  • ${m.sender.split(',')[0]} — ${m.summary||m.subject}`;if(m.deadline)r+=` [By: ${m.deadline}]`;r+='\n';}):r+='  None\n';
    r+='\n';
  });
  r+=`Total active: ${msgs.filter(m=>m.priority!=='done').length}`;
  navigator.clipboard.writeText(r).then(()=>toast('Copied!'));
}

/* ── PDF ── */
function downloadPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const msgs=msgsForDate(activeDate);const secs=buildRptData();
  const PW=210,PH=297,ML=18,MR=18,CW=210-18-18;
  let y=20;
  const sf=(sz,st='normal',col='#1A1A18')=>{doc.setFontSize(sz);doc.setFont('helvetica',st);doc.setTextColor(col);};
  const ln=(y2,col='#E8E6DF',lw=0.3)=>{doc.setDrawColor(col);doc.setLineWidth(lw);doc.line(ML,y2,PW-MR,y2);};
  const rc=(x,y2,w,h,fill,rd=2)=>{doc.setFillColor(fill);doc.roundedRect(x,y2,w,h,rd,rd,'F');};
  const chk=(n)=>{if(y+n>PH-15){doc.addPage();y=20;}};
  // Header
  rc(0,0,PW,40,'#1A1A18',0);
  doc.setTextColor('#FFFFFF');doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text('JECRC UNIVERSITY',ML,11);
  doc.setFontSize(17);doc.setFont('helvetica','bold');doc.text("Director's Inbox Report",ML,21);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.text(fmtFull(activeDate),ML,30);
  doc.text('Generated: '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),PW-MR,30,{align:'right'});
  y=48;
  // Stats
  const active=msgs.filter(m=>m.priority!=='done').length;
  const urgent=msgs.filter(m=>m.priority==='urgent').length;
  const done=msgs.filter(m=>m.priority==='done').length;
  const sw=(CW-9)/4;
  [{n:urgent,l:'Urgent',bg:'#FEF0EF',tc:'#8B2020'},{n:active,l:'Active',bg:'#F1EFE8',tc:'#1A1A18'},{n:done,l:'Done',bg:'#EDFAF3',tc:'#0F5C35'},{n:msgs.length,l:'Total',bg:'#EDF4FE',tc:'#1A4F8A'}].forEach((s,i)=>{
    const x=ML+i*(sw+3);rc(x,y,sw,16,s.bg,3);
    doc.setTextColor(s.tc);doc.setFontSize(16);doc.setFont('helvetica','bold');doc.text(String(s.n),x+sw/2,y+8,{align:'center'});
    doc.setTextColor('#9E9C97');doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(s.l,x+sw/2,y+13,{align:'center'});
  });
  y+=22;ln(y);y+=6;
  // Sections
  secs.forEach(s=>{
    if(!s.items.length)return;
    const c=RPC[s.id]||RPC.fyi;
    chk(14);
    rc(ML,y,CW,8,c.bg,2);
    doc.setFillColor(c.dot);doc.circle(ML+5,y+4,1.5,'F');
    sf(8,'bold',c.t);doc.text(`${s.label.toUpperCase()}  (${s.items.length})`,ML+10,y+5.5);
    y+=11;
    s.items.forEach((m,idx)=>{
      const lines=doc.splitTextToSize(m.summary||m.subject,CW-26);
      const bh=Math.max(14,lines.length*4+8)+(m.deadline?4:0);
      chk(bh+3);
      if(idx%2===0)rc(ML,y,CW,bh,'#FAFAF8',2);
      doc.setFillColor(c.dot);doc.roundedRect(ML,y,2,bh,1,1,'F');
      sf(9,'bold','#1A1A18');doc.text(m.sender.split(',')[0],ML+6,y+6);
      if(m.time){sf(7,'normal','#9E9C97');doc.text(m.time,PW-MR,y+6,{align:'right'});}
      sf(8,'normal','#6B6A65');doc.text(lines,ML+6,y+11);
      if(m.deadline){
        const dy=y+11+lines.length*4+1;
        rc(ML+6,dy-3,42,5,'#FEF5E7',2);
        doc.setTextColor('#7A4A0A');doc.setFontSize(7);doc.text('By: '+m.deadline,ML+8,dy+1);
      }
      y+=bh+3;
    });
    y+=4;
  });
  chk(12);ln(y,'#D4D2CB',0.4);y+=5;
  sf(8,'normal','#9E9C97');doc.text("Director's Office — JECRC University",ML,y+4);doc.text('Confidential',PW-MR,y+4,{align:'right'});
  doc.save(`Directors_Inbox_${activeDate}.pdf`);
  toast('PDF downloaded!');
}

initFirebase();
